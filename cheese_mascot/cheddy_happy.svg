<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 190" width="440" height="380">
  
  <defs>
    <linearGradient id="bodyMain" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F5C033"/>
      <stop offset="100%" stop-color="#E8AD20"/>
    </linearGradient>
    <linearGradient id="bodySide" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#D9A020"/>
      <stop offset="100%" stop-color="#C48E18"/>
    </linearGradient>
    <linearGradient id="bodyTop" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFF3B0"/>
    </linearGradient>
    <radialGradient id="holeGrad" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#E8B830"/>
      <stop offset="100%" stop-color="#C49518"/>
    </radialGradient>
    <radialGradient id="holeSideGrad" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#CFA028"/>
      <stop offset="100%" stop-color="#A88015"/>
    </radialGradient>
    <radialGradient id="eyeW" cx="0.45" cy="0.38" r="0.6">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEEEF5"/>
    </radialGradient>
    <radialGradient id="heartG" cx="0.4" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#FF4070"/>
      <stop offset="100%" stop-color="#D02548"/>
    </radialGradient>
    <radialGradient id="mouthG" cx="0.5" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#E85555"/>
      <stop offset="100%" stop-color="#B52828"/>
    </radialGradient>
    <radialGradient id="footG" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#8B6530"/>
      <stop offset="100%" stop-color="#5C4018"/>
    </radialGradient>
    <filter id="shadow" x="-8%" y="-5%" width="118%" height="118%">
      <feDropShadow dx="1.5" dy="3" stdDeviation="2.5" flood-color="#2A1A0540"/>
    </filter>
    <filter id="blurBlush" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <g>
    
    <g>
      <!-- Left leg -->
      <rect x="85" y="153" width="15" height="18" rx="5"
            fill="#F0BE30" stroke="#3D2B0A" stroke-width="3.8"/>
      <ellipse cx="92" cy="174" rx="13" ry="7"
               fill="url(#footG)" stroke="#3D2B0A" stroke-width="3.8"/>

      <!-- Right leg -->
      <rect x="130" y="153" width="15" height="18" rx="5"
            fill="#F0BE30" stroke="#3D2B0A" stroke-width="3.8"/>
      <ellipse cx="137" cy="174" rx="13" ry="7"
               fill="url(#footG)" stroke="#3D2B0A" stroke-width="3.8"/>
    </g>
    
    
    <g filter="url(#shadow)">
      <!-- Right side face (3D depth) -->
      <path d="M168,42 Q175,38 178,36 L185,40 L178,148 Q175,152 170,154 L165,155 Z"
            fill="url(#bodySide)" stroke="#3D2B0A" stroke-width="3.8" stroke-linejoin="round"/>
      <!-- Side holes -->
      <circle cx="174" cy="75" r="5" fill="url(#holeSideGrad)" stroke="#A88018" stroke-width="1.2"/>
      <circle cx="176" cy="115" r="4" fill="url(#holeSideGrad)" stroke="#A88018" stroke-width="1.2"/>

      <!-- Top face (thin visible strip) -->
      <path d="M100,18 Q105,15 112,16 L178,36 Q175,38 168,42 L100,28 Q96,25 100,18 Z"
            fill="url(#bodyTop)" stroke="#3D2B0A" stroke-width="3.8" stroke-linejoin="round"/>
      <!-- Top hole -->
      <ellipse cx="140" cy="32" rx="6" ry="3.5" fill="#E8C840" stroke="#C8A828" stroke-width="1"
               transform="rotate(-5,140,32)"/>

      <!-- Front face: the main wedge shape -->
      <!-- Rounded wedge: narrow top, wide bottom, curved sides -->
      <path d="M100,28
               Q95,28 80,48
               Q52,90 45,140
               Q43,150 48,155
               L165,155
               Q170,152 168,142
               L168,42
               Q165,35 100,28 Z"
            fill="url(#bodyMain)" stroke="#3D2B0A" stroke-width="3.8" stroke-linejoin="round" stroke-linecap="round"/>

      <!-- Front face cheese holes (BIG, round, Swiss-style) -->
      <circle cx="80" cy="60" r="12" fill="url(#holeGrad)" stroke="#C49820" stroke-width="1.5"/>
      <circle cx="82" cy="57" r="5" fill="#E8C040" opacity="0.35"/>

      <circle cx="140" cy="65" r="9" fill="url(#holeGrad)" stroke="#C49820" stroke-width="1.5"/>
      <circle cx="141" cy="63" r="4" fill="#E8C040" opacity="0.35"/>

      <circle cx="65" cy="105" r="8" fill="url(#holeGrad)" stroke="#C49820" stroke-width="1.5"/>

      <circle cx="150" cy="110" r="10" fill="url(#holeGrad)" stroke="#C49820" stroke-width="1.5"/>
      <circle cx="151" cy="108" r="4.5" fill="#E8C040" opacity="0.3"/>

      <circle cx="90" cy="140" r="6" fill="url(#holeGrad)" stroke="#C49820" stroke-width="1.3"/>

      <!-- Highlight on front face -->
      <path d="M100,30 Q95,32 85,48 Q80,58 78,65"
            fill="none" stroke="white" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
    </g>
    
    
    <g>
      <!-- Left arm nub -->
      <path d="M50,115 Q38,118 35,126 Q34,132 38,133 Q42,134 44,128 Q47,122 52,118"
            fill="#F0BE30" stroke="#3D2B0A" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Right arm nub -->
      <path d="M165,118 Q175,120 178,128 Q179,134 175,135 Q171,136 169,130 Q167,124 165,120"
            fill="#D9A020" stroke="#3D2B0A" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    
    <g>
      <ellipse cx="95" cy="90" rx="14" ry="15" fill="url(#eyeW)" stroke="#3D2B0A" stroke-width="2.8"/>
      <ellipse cx="98" cy="91" rx="7" ry="8" fill="#1A1A1A"/>
      <circle cx="101" cy="86" r="3.5" fill="white" opacity="0.95"/>
      <circle cx="94" cy="95" r="1.8" fill="white" opacity="0.4"/>

      <ellipse cx="135" cy="92" rx="13" ry="14" fill="url(#eyeW)" stroke="#3D2B0A" stroke-width="2.8"/>
      <ellipse cx="138" cy="93" rx="6.5" ry="7.5" fill="#1A1A1A"/>
      <circle cx="141" cy="88" r="3.2" fill="white" opacity="0.95"/>
      <circle cx="134" cy="97" r="1.6" fill="white" opacity="0.4"/>
    </g>
    
    
    <g>
      <ellipse cx="75" cy="112" rx="10" ry="6.5" fill="#FF8090" filter="url(#blurBlush)" opacity="0.55"/>
      <ellipse cx="147" cy="112" rx="10" ry="6.5" fill="#FF8090" filter="url(#blurBlush)" opacity="0.50"/>
    </g>
    
    
    <g>
      <path d="M100,120 Q113,143 128,120 Z" fill="url(#mouthG)" stroke="#3D2B0A" stroke-width="2.5"/>
      <path d="M107,133 Q113,140 120,133" fill="#E87080"/>
    </g>
    
  </g>
</svg>