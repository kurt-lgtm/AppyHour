<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/command-center/cc.css?v=10">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--cc-base, #08090d);
            color: var(--cc-text-1, #e8eaf0);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }
        #commandcenter-view { display: block; }
    </style>
</head>
<body>

<!-- Standalone: no sidebar nav, just command center -->
<div id="commandcenter-view">
    <div class="cc-layout">
        <!-- Left: Task list -->
        <div class="cc-main">
            <div class="cc-header">
                <div class="cc-greeting" id="cc-greeting"></div>
                <div class="cc-energy">
                    <span class="cc-energy-label">Energy:</span>
                    <button class="cc-energy-btn" data-level="high" onclick="ccSetEnergy('high')">High</button>
                    <button class="cc-energy-btn active" data-level="medium" onclick="ccSetEnergy('medium')">Med</button>
                    <button class="cc-energy-btn" data-level="low" onclick="ccSetEnergy('low')">Low</button>
                    <span style="width:1px;height:16px;background:#2a2a4a;margin:0 6px"></span>
                    <button class="cc-energy-btn" onclick="ccShowEOD()">Wrap up</button>
                    <button class="cc-energy-btn" onclick="ccShowWeeklyReview()">Review</button>
                    <button class="cc-energy-btn" onclick="ccBadDayTriage()">Triage</button>
                </div>
            </div>

            <!-- Morning Brief -->
            <div class="cc-brief" id="cc-brief" style="display:none">
                <div class="cc-brief-header">
                    <span>MORNING BRIEF</span>
                    <button class="cc-brief-dismiss" onclick="ccDismissBrief()" aria-label="Dismiss morning brief">&times;</button>
                </div>
                <div class="cc-brief-body" id="cc-brief-body"></div>
            </div>

            <!-- Active Task (expanded when running) -->
            <div class="cc-active-task" id="cc-active-task" style="display:none"></div>

            <!-- Task Sections -->
            <div class="cc-section" id="cc-quickwins">
                <div class="cc-section-label"><span class="cc-section-icon">&#9889;</span> QUICK WINS</div>
                <div class="cc-task-list" id="cc-quickwins-list"></div>
            </div>

            <div class="cc-section" id="cc-frog">
                <div class="cc-section-label"><span class="cc-section-icon">&#128056;</span> EAT THE FROG</div>
                <div class="cc-task-list" id="cc-frog-list"></div>
            </div>

            <div class="cc-section" id="cc-today">
                <div class="cc-section-label"><span class="cc-section-icon">&#128203;</span> TODAY</div>
                <div class="cc-task-list" id="cc-today-list"></div>
            </div>

            <div class="cc-section" id="cc-personal">
                <div class="cc-section-label"><span class="cc-section-icon">&#127968;</span> PERSONAL</div>
                <div class="cc-task-list" id="cc-personal-list"></div>
            </div>

            <div class="cc-section cc-section-collapsed" id="cc-blocked">
                <div class="cc-section-label" onclick="ccToggleSection('cc-blocked')"><span class="cc-section-icon">&#9203;</span> WAITING ON <span class="cc-badge" id="cc-blocked-count">0</span></div>
                <div class="cc-task-list" id="cc-blocked-list"></div>
            </div>

            <div class="cc-section cc-section-collapsed" id="cc-completed">
                <div class="cc-section-label" onclick="ccToggleSection('cc-completed')"><span class="cc-section-icon">&#10004;</span> DONE TODAY <span class="cc-badge" id="cc-completed-count">0</span></div>
                <div class="cc-task-list" id="cc-completed-list"></div>
            </div>

            <!-- Add task -->
            <div class="cc-add-bar">
                <input type="text" id="cc-add-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')ccAddTask()">
                <select id="cc-add-type">
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                </select>
                <button class="cc-add-btn" onclick="ccAddTask()">+</button>
            </div>
        </div>

        <!-- Right: Status + Chat -->
        <div class="cc-sidebar">
            <!-- Mission Control Helper -->
            <div class="cc-helper">
                <svg id="cc-mascot" viewBox="0 0 120 130" width="120" height="130">
                    <defs>
                        <radialGradient id="hg" cx="0.4" cy="0.3" r="0.65">
                            <stop offset="0%" stop-color="#5eebc0"/>
                            <stop offset="100%" stop-color="#2a9d7e"/>
                        </radialGradient>
                        <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    </defs>
                    <!-- Body: rounded satellite/robot -->
                    <ellipse cx="60" cy="75" rx="38" ry="36" fill="url(#hg)" stroke="#1a6b55" stroke-width="2.5"/>
                    <!-- Visor/face plate -->
                    <rect x="32" y="55" width="56" height="32" rx="14" fill="#0a1a15" stroke="#4ecca3" stroke-width="1.5"/>
                    <!-- Eyes -->
                    <circle id="cc-eye-l" cx="47" cy="71" r="5" fill="#4ecca3" filter="url(#glow)"/>
                    <circle id="cc-eye-r" cx="73" cy="71" r="5" fill="#4ecca3" filter="url(#glow)"/>
                    <!-- Antenna -->
                    <line x1="60" y1="39" x2="60" y2="22" stroke="#4ecca3" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="60" cy="18" r="5" fill="#4ecca3" filter="url(#glow)">
                        <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <!-- Arms -->
                    <line x1="22" y1="75" x2="8" y2="65" stroke="#2a9d7e" stroke-width="3" stroke-linecap="round"/>
                    <line x1="98" y1="75" x2="112" y2="65" stroke="#2a9d7e" stroke-width="3" stroke-linecap="round"/>
                    <!-- Mouth (expression changes) -->
                    <path id="cc-mouth" d="M45,80 Q60,90 75,80" fill="none" stroke="#4ecca3" stroke-width="2" stroke-linecap="round"/>
                    <!-- Feet -->
                    <rect x="38" y="108" width="16" height="8" rx="4" fill="#2a9d7e" stroke="#1a6b55" stroke-width="1.5"/>
                    <rect x="66" y="108" width="16" height="8" rx="4" fill="#2a9d7e" stroke="#1a6b55" stroke-width="1.5"/>
                </svg>
                <div id="cc-helper-speech" class="cc-helper-speech">Ready for duty.</div>
            </div>

            <div class="cc-progress">
                <div class="cc-progress-label">TODAY</div>
                <div class="cc-progress-bar">
                    <div class="cc-progress-fill" id="cc-progress-fill" style="width:0%"></div>
                </div>
                <div class="cc-progress-text" id="cc-progress-text">0 of 0</div>
            </div>

            <div class="cc-deadlines" id="cc-deadlines">
                <div class="cc-sidebar-label">UPCOMING</div>
            </div>

            <div class="cc-streaks" id="cc-streaks">
                <div class="cc-sidebar-label">STREAKS</div>
            </div>

            <div class="cc-chat">
                <div class="cc-sidebar-label">ASK CLAUDE</div>
                <div class="cc-chat-messages" id="cc-chat-messages" role="log" aria-live="polite" aria-label="Chat conversation">
                    <div class="cc-chat-system">What can I help with?</div>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 8px;font-family:'Space Mono',monospace;font-size:10px;color:#5a6070">
                    <span id="cc-chat-model-label">haiku</span>
                    <button onclick="ccSetChatModel(ccChatModel==='claude-haiku-4-5-20251001'?'claude-sonnet-4-6-20250610':'claude-haiku-4-5-20251001');document.getElementById('cc-chat-model-label').textContent=ccChatModel.includes('haiku')?'haiku':'sonnet'" style="border:1px solid #2a2a4a;border-radius:4px;background:transparent;color:#6366f1;padding:2px 8px;font-size:10px;cursor:pointer;font-family:'Space Mono',monospace">Deep Think</button>
                </div>
                <div class="cc-chat-input">
                    <input type="text" id="cc-chat-input" placeholder="Type anything..." aria-label="Chat message" onkeydown="if(event.key==='Enter')ccSendChat()">
                    <button onclick="ccSendChat()" aria-label="Send message">&#9654;</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Standalone shim: cc.js expects currentView variable -->
<script>let currentView = 'commandcenter';</script>
<script src="/static/command-center/cc.js?v=10"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        ccLoad();
    });
</script>
</body>
</html>
