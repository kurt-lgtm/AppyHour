{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="login">
  <h2>Sign in</h2>
  <form method="post">
    <label>Password
      <input type="password" name="password" autocomplete="current-password" required autofocus>
    </label>
    <button type="submit">Enter</button>
  </form>
</section>
{% endblock %}
