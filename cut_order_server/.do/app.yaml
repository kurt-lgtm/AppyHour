# DigitalOcean App Platform spec for Cut Order Server
# Import into DO Console: Apps → Create App → import from spec
# OR push to GitHub, point App Platform at this repo + subdir, and it auto-detects.
name: cut-order
region: nyc

services:
  - name: web
    github:
      repo: kurt-lgtm/AppyHour
      branch: main
      deploy_on_push: true
    source_dir: cut_order_server
    environment_slug: python
    instance_size_slug: basic-xxs        # $5/mo, 512MB RAM
    instance_count: 1
    http_port: 8080
    run_command: gunicorn -c gunicorn_conf.py wsgi:application
    health_check:
      http_path: /healthz
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 3
    routes:
      - path: /
    envs:
      # ─── Flask ──────────────────────────────────────────────────────
      - key: FLASK_SECRET_KEY
        type: SECRET
        scope: RUN_TIME
      - key: FLASK_ENV
        value: production
        scope: RUN_TIME
      - key: APP_PASSWORD
        type: SECRET
        scope: RUN_TIME

      # ─── Shopify ────────────────────────────────────────────────────
      - key: SHOPIFY_STORE_URL
        value: elevatefoods
        scope: RUN_TIME
      - key: SHOPIFY_ACCESS_TOKEN
        type: SECRET
        scope: RUN_TIME
      - key: SHOPIFY_API_VERSION
        value: "2026-04"
        scope: RUN_TIME

      # ─── Recharge ───────────────────────────────────────────────────
      - key: RECHARGE_TOKEN
        type: SECRET
        scope: RUN_TIME

      # ─── LTF / Google Sheets ────────────────────────────────────────
      - key: LTF_SHEET_ID
        value: "1Obz-Ib6KsjhB83NiRlFFCLFk9UjHr_YZl8lONl6VzKw"
        scope: RUN_TIME
      - key: GOOGLE_SVC_ACCOUNT_JSON_CONTENT
        type: SECRET
        scope: RUN_TIME
        # paste full service account JSON content (the contents of
        # shipping-perfomance-review-accd39ac4b78.json) as the secret value.

      # ─── DO Spaces ──────────────────────────────────────────────────
      - key: DO_SPACES_ENDPOINT
        value: https://nyc3.digitaloceanspaces.com
        scope: RUN_TIME
      - key: DO_SPACES_REGION
        value: nyc3
        scope: RUN_TIME
      - key: DO_SPACES_BUCKET
        value: cut-orders
        scope: RUN_TIME
      - key: DO_SPACES_KEY
        type: SECRET
        scope: RUN_TIME
      - key: DO_SPACES_SECRET
        type: SECRET
        scope: RUN_TIME

      # ─── Tuning ─────────────────────────────────────────────────────
      - key: GUNICORN_WORKERS
        value: "2"
        scope: RUN_TIME
